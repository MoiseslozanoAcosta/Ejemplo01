<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="menuAdmin"
     class="navbar navbar-expand-lg bg-body-tertiary border-bottom shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-primary" th:href="@{/admin}"
       sec:authorize="hasRole('ADMIN')">Panel Admin</a>
    <a class="navbar-brand fw-bold text-primary" th:href="@{/home}"
       sec:authorize="!hasRole('ADMIN')">Consola</a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarAdmin">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarAdmin">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <!-- Solo ADMIN ve Inicio del panel -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:classappend="${activeAdmin}"
             th:href="@{/admin}">Inicio</a>
        </li>

        <!-- ADMIN y COORD ven Divisiones y Ofertas -->
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','COORD')">
          <a class="nav-link" th:classappend="${activeAdminDivision}"
             th:href="@{/admin/division}">Divisiones</a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','COORD')">
          <a class="nav-link" th:classappend="${activeAdminOferta}"
             th:href="@{/admin/oferta}">Ofertas</a>
        </li>

        <!-- ADMIN y COORD ven Email -->
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','COORD')">
          <a class="nav-link" th:classappend="${activeAdminEmail}"
             th:href="@{/email/form}">Email</a>
        </li>

        <!-- ADMIN y ASPIRANTE ven Perfiles -->
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ASPIRANTE')">
          <a class="nav-link" th:classappend="${activeAdminPerfil}"
             th:href="@{/admin/perfil}">Perfiles de Ingreso</a>
        </li>

        <!-- ADMIN y EDITOR ven Conoce UTEQ y Directorio -->
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','EDITOR')">
          <a class="nav-link" th:classappend="${activeAdminConoce}"
             th:href="@{/admin/conoce}">Conoce UTEQ</a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','EDITOR')">
          <a class="nav-link" th:classappend="${activeAdminDirectorio}"
             th:href="@{/admin/directorio}">Directorio</a>
        </li>

      </ul>

      <!-- Usuario logueado + rol -->
      <div sec:authorize="isAuthenticated()"
           class="d-flex align-items-center gap-2 me-3">
        <span class="navbar-text fw-semibold"
              th:text="${#authentication.name}">Usuario</span>
        <span class="badge bg-secondary small"
              th:text="${#authentication.principal.authorities}">Rol</span>
      </div>

      <!-- Cerrar sesión -->
      <form th:action="@{/logout}" method="post"
            sec:authorize="isAuthenticated()">
        <button type="submit" class="btn btn-outline-danger btn-sm">
          Cerrar sesión
        </button>
      </form>
    </div>
  </div>
</nav>
</body>
</html>
