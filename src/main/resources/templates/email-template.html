<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; padding: 20px; }
    .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .header { color: #4A90E2; border-bottom: 2px solid #4A90E2; padding-bottom: 10px; }
    .footer { margin-top: 20px; font-size: 12px; color: #888; }
</style>
</head>
<body>
    <div class="card">
        <h1 class="header">¡Hola, <span th:text="${nombre}">Amigo</span>!</h1>
        <p th:text="${mensaje}">Bienvenido a nuestra plataforma.</p>
        <p>Tu código de acceso es: <strong th:text="${codigo}">0000</strong></p>
        <div class="footer">Este es un correo automático de prueba UTEQ.</div>
    </div>
</body>
</html>
