<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Conoce UTEQ | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/menu-admin :: menuAdmin}"></nav>

<div class="container mt-3">
    <div th:replace="~{fragments/breadcrumbadmin :: breadcrumb(${breadcrumb})}"></div>
</div>

<div class="container mt-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h4 class="fw-bold mb-0">Gestión — Conoce UTEQ</h4>
            <a th:href="@{/admin/conoce/add}" class="btn btn-success">+ Nueva Sección</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Tipo</th>
                        <th>Contenido</th>
                        <th>Orden</th>
                        <th>Estatus</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${secciones}">
                        <td class="ps-4" th:text="${s.id}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${s.tipoSeccion}"></span>
                        </td>
                        <td th:text="${#strings.abbreviate(s.contenido, 80)}"></td>
                        <td th:text="${s.orden}"></td>
                        <td>
                            <span th:class="${s.activo ? 'text-success fw-bold' : 'text-danger fw-bold'}"
                                  th:text="${s.activo ? 'Activo' : 'Inactivo'}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/admin/conoce/edit/{id}(id=${s.id})}"
                               class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/admin/conoce/delete/{id}(id=${s.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar esta sección?')">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(secciones)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            No hay secciones registradas. Agrega la primera.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
