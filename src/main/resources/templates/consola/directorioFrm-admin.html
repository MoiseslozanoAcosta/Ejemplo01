<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Editor de Contacto | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/menu-admin :: menuAdmin}"></nav>

<div class="container mt-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom">
            <h2 class="h4 mb-0 fw-bold" th:text="${titulo}">Formulario</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/directorio/save}"
                  th:object="${directorio}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Nombre completo</label>
                        <input type="text" class="form-control"
                               th:field="*{nombre}"
                               placeholder="Ej. Mtra. Ana García López" required/>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Puesto</label>
                        <input type="text" class="form-control"
                               th:field="*{puesto}"
                               placeholder="Ej. Rectora" required/>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('puesto')}"
                             th:errors="*{puesto}"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Departamento</label>
                        <input type="text" class="form-control"
                               th:field="*{departamento}"
                               placeholder="Ej. Rectoría"/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Teléfono</label>
                        <input type="text" class="form-control"
                               th:field="*{telefono}"
                               placeholder="Ej. 442 192 12 00"/>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Correo electrónico</label>
                        <input type="email" class="form-control"
                               th:field="*{email}"
                               placeholder="Ej. contacto@uteq.edu.mx"/>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-bold">Orden</label>
                        <input type="number" class="form-control"
                               th:field="*{orden}" min="1"/>
                    </div>
                    <div class="col-md-3 mb-3 d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input"
                                   th:field="*{activo}" id="checkActivo"/>
                            <label class="form-check-label fw-bold" for="checkActivo">
                                Contacto Activo
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary px-4">Guardar</button>
                    <a th:href="@{/admin/directorio}" class="btn btn-light border px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
