<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Divisiones | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <nav th:replace="fragments/menu-admin :: menuAdmin"></nav>

    <div class="container-fluid px-4 mt-3">
        <div th:replace="fragments/breadcrumbadmin :: breadcrumb(${breadcrumb})"></div>

        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h4 class="fw-bold text-primary mb-0">Estructura Institucional</h4>
                <div class="d-flex gap-2">
                    <button class="btn btn-dark" onclick="openModalDivision()">Nueva División JS</button>
                    <a th:href="@{/admin/division/add}" class="btn btn-outline-dark">Nueva División Type</a>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">Identificador</th>
                            <th>Código</th>
                            <th>Nombre de la División</th>
                            <th>Estatus</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="division : ${divisiones}">
                            <td class="ps-4" th:text="${division.id}"></td>
                            <td class="fw-bold" th:text="${division.clave}"></td>
                            <td th:text="${division.nombreDivision}"></td>
                            <td>
                                <span th:class="${division.activo ? 'text-success' : 'text-danger'}">
                                    <i class="bi bi-circle-fill small"></i> 
                                    <span th:text="${division.activo ? 'Habilitada' : 'Desactivada'}"></span>
                                </span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/division/edit/{id}(id=${division.id})}" class="btn btn-outline-warning btn-sm">Type</a>
                                <button class="btn btn-info btn-sm text-white" th:onclick="'openModalDivision(' + ${division.id} + ')'">JS</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDivision" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalDivisionLabel">Gestión Administrativa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form th:action="@{/admin/division/save}" th:object="${division}" method="post" id="divisionForm">
                        <input type="hidden" th:field="*{id}" id="divisionId" />
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre Oficial</label>
                            <input type="text" class="form-control" th:field="*{nombreDivision}" id="divisionNombre" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Clave Unívoca</label>
                            <input type="text" class="form-control" th:field="*{clave}" id="divisionClave" required />
                        </div>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" th:field="*{activo}" id="activo">
                            <label class="form-check-label" for="activo">¿División en operación?</label>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-primary px-4" onclick="guardarDivision()">Guardar Registro</button>
                            <button type="button" class="btn btn-light border px-4" data-bs-dismiss="modal">Cerrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/division.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
