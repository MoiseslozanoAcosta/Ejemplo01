<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Directorio | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/menu-admin :: menuAdmin}"></nav>

<div class="container mt-3">
    <div th:replace="~{fragments/breadcrumbadmin :: breadcrumb(${breadcrumb})}"></div>
</div>

<div class="container mt-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h4 class="fw-bold mb-0">Directorio Institucional</h4>
            <a th:href="@{/admin/directorio/add}" class="btn btn-success">+ Nuevo Contacto</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Nombre</th>
                        <th>Puesto</th>
                        <th>Departamento</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Estatus</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${contactos}">
                        <td class="ps-4" th:text="${c.id}"></td>
                        <td class="fw-bold" th:text="${c.nombre}"></td>
                        <td th:text="${c.puesto}"></td>
                        <td th:text="${c.departamento}"></td>
                        <td th:text="${c.telefono}"></td>
                        <td th:text="${c.email}"></td>
                        <td>
                            <span th:class="${c.activo ? 'text-success fw-bold' : 'text-danger fw-bold'}"
                                  th:text="${c.activo ? 'Activo' : 'Inactivo'}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/admin/directorio/edit/{id}(id=${c.id})}"
                               class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/admin/directorio/delete/{id}(id=${c.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar este contacto?')">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(contactos)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            No hay contactos registrados. Agrega el primero.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
