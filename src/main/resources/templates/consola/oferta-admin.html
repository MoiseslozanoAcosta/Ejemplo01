<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ofertas Educativas | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .oferta-card { border: none; border-radius: 20px; transition: all 0.3s ease; }
        .oferta-card:hover { shadow: 0 10px 20px rgba(0,0,0,0.1); transform: translateY(-5px); }
        .icon-box { background: #f0f2f5; border-radius: 15px; padding: 15px; display: inline-block; }
    </style>
</head>
<body class="bg-light">
    <nav th:replace="fragments/menu-admin :: menuAdmin"></nav>

    <div class="container mt-4">
        <div th:replace="fragments/breadcrumbadmin :: breadcrumb(${breadcrumb})"></div>

        <div class="row align-items-center mb-5">
            <div class="col">
                <h1 class="h2 fw-bold text-dark">Catálogo Académico</h1>
                <p class="text-muted">Administración de programas y modalidades disponibles</p>
            </div>
            <div class="col-auto">
                <button class="btn btn-success rounded-pill px-4" onclick="openModalOferta()">+ Nuevo Registro</button>
                <a th:href="@{/admin/oferta/add}" class="btn btn-outline-success rounded-pill px-4">Alta Manual</a>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4" id="ofertasGrid">
            <div class="col" th:each="oferta : ${ofertas}">
                <div class="card h-100 shadow-sm" th:attr="data-oferta-id=${oferta.id}">
                    <div class="card-body text-center p-4">
                        <div class="icon-box mb-3">
                            <!-- ✅ clase card-img agregada -->
                            <img th:src="@{${oferta.imagen}}" class="card-img"
                                 style="width: 50px; height: 50px; object-fit: contain;" alt="Icono" />
                        </div>
                        <!-- ✅ clase card-title agregada -->
                        <h5 class="fw-bold mb-1 card-title" th:text="${oferta.nombreOferta}">Nombre</h5>
                        <!-- ✅ clase card-text agregada -->
                        <p class="badge bg-primary-subtle text-primary mb-3 card-text" th:text="${oferta.modalidad}">Modalidad</p>

                        <div class="d-flex justify-content-center gap-2 mt-2">
                            <button class="btn btn-sm btn-info w-50" th:onclick="'openModalOferta(' + ${oferta.id} + ')'">Editar JS</button>
                            <a th:href="@{/admin/oferta/edit/{id}(id=${oferta.id})}" class="btn btn-sm btn-warning w-50">Editar Type</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalOferta" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalOfertaLabel">Formulario de Oferta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form th:action="@{/admin/oferta/save}" th:object="${ofertaEducativa}" method="post" id="ofertaForm">
                        <input type="hidden" th:field="*{id}" id="ofertaId" />
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Nombre de la Carrera</label>
                            <input type="text" class="form-control shadow-sm" th:field="*{nombreOferta}" id="ofertaNombre" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Modalidad</label>
                            <select class="form-select shadow-sm" th:field="*{modalidad}" id="ofertaModalidad">
                                <option value="Presencial">Presencial</option>
                                <option value="Virtual">Virtual</option>
                                <option value="Mixta">Mixta</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Ruta de Imagen</label>
                            <input type="text" class="form-control shadow-sm" th:field="*{imagen}" id="ofertaImagen" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">División</label>
                            <select class="form-select shadow-sm" th:field="*{division}" id="ofertaDivision">
                                <option th:each="division : ${divisiones}" th:value="${division.id}" th:text="${division.clave} + ' - ' + ${division.nombreDivision}"></option>
                            </select>
                        </div>
                        <button type="button" class="btn btn-primary w-100 mt-3 py-2 shadow" onclick="guardarOferta()">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/oferta.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
