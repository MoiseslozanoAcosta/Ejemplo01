<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Editor de Sección | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/menu-admin :: menuAdmin}"></nav>

<div class="container mt-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom">
            <h2 class="h4 mb-0 fw-bold" th:text="${titulo}">Formulario</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/conoce/save}"
                  th:object="${conoceUteq}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-bold">Tipo de Sección</label>
                    <select class="form-select" th:field="*{tipoSeccion}" required>
                        <option value="">-- Seleccione --</option>
                        <option th:each="tipo : ${tiposSecciones}"
                                th:value="${tipo}"
                                th:text="${tipo}"></option>
                    </select>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('tipoSeccion')}"
                         th:errors="*{tipoSeccion}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Contenido</label>
                    <textarea class="form-control" th:field="*{contenido}"
                              rows="5" required
                              placeholder="Escribe el contenido de esta sección..."></textarea>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('contenido')}"
                         th:errors="*{contenido}"></div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Texto del Documento</label>
                        <input type="text" class="form-control"
                               th:field="*{textoDocumento}"
                               placeholder="Ej. MO-UTEQ-001"/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Revisión</label>
                        <input type="text" class="form-control"
                               th:field="*{revision}"
                               placeholder="Ej. Rev. 03"/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Fecha del Documento</label>
                        <input type="text" class="form-control"
                               th:field="*{fechaDocumento}"
                               placeholder="Ej. Enero 2025"/>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Orden de visualización</label>
                        <input type="number" class="form-control"
                               th:field="*{orden}" min="1"/>
                    </div>
                    <div class="col-md-4 mb-3 d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input"
                                   th:field="*{activo}" id="checkActivo"/>
                            <label class="form-check-label fw-bold" for="checkActivo">
                                Sección Activa
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary px-4">Guardar</button>
                    <a th:href="@{/admin/conoce}" class="btn btn-light border px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
