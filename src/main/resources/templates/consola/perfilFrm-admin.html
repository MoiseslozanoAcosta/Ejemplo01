<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Editor de Perfil | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  </head>
  <body class="bg-light">
    <nav th:replace="fragments/menu-admin :: menuAdmin"></nav>

    <div class="container mt-4">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom">
          <h2 class="h4 mb-0 fw-bold" th:text="${titulo}">Formulario</h2>
        </div>
        <div class="card-body">
          <form th:action="@{/admin/perfil/save}"
                th:object="${perfilIngreso}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
              <label class="form-label fw-bold">Título del Perfil</label>
              <input type="text" class="form-control"
                     th:field="*{titulo}"
                     placeholder="Ej. Perfil de Ingreso ISC" required/>
              <div class="text-danger small mt-1"
                   th:if="${#fields.hasErrors('titulo')}"
                   th:errors="*{titulo}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Descripción</label>
              <textarea class="form-control" th:field="*{descripcion}"
                        rows="3" required></textarea>
              <div class="text-danger small mt-1"
                   th:if="${#fields.hasErrors('descripcion')}"
                   th:errors="*{descripcion}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Oferta Educativa</label>
              <select class="form-select" th:field="*{ofertaEducativa}" required>
                <option value="">-- Seleccione una oferta --</option>
                <option th:each="oferta : ${ofertas}"
                        th:value="${oferta.id}"
                        th:text="${oferta.nombreOferta}"></option>
              </select>
            </div>

            <div class="mt-4">
              <button type="submit" class="btn btn-primary px-4">Guardar Perfil</button>
              <a th:href="@{/admin/perfil}" class="btn btn-light border px-4">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
