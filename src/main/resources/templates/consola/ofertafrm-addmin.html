<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editor de Oferta | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{fragments/menu-admin :: menuAdmin}"></nav>

    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h2 class="h4 mb-0 fw-bold" th:text="${titulo}">Formulario</h2>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/oferta/save}" th:object="${ofertaEducativa}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre de la Oferta</label>
                        <input type="text" class="form-control" th:field="*{nombreOferta}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Modalidad</label>
                        <select class="form-select" th:field="*{modalidad}" required>
                            <option value="Presencial">Presencial</option>
                            <option value="Virtual">Virtual</option>
                            <option value="Mixta">Mixta</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">URL de la Imagen</label>
                        <input type="text" class="form-control" th:field="*{imagen}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">División</label>
                        <select class="form-select" th:field="*{division}" required>
                            <option value="">-- Seleccione una división --</option>
                            <option th:each="division : ${divisiones}" 
                                    th:value="${division.id}" 
                                    th:text="${division.clave} + ' - ' + ${division.nombreDivision}">
                            </option>
                        </select>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        <a th:href="@{/admin/oferta}" class="btn btn-light border">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
