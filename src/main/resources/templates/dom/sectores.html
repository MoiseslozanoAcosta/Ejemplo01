<!DOCTYPE html>
<html>
<body>

    <h2>Encontrar elementos por Query Selector</h2>

    <p>¡Hola, mundo!</p>

    <p class="intro">El DOM es muy util</p>
    <p class="intro">Este ejemplo muestra el metodo <b>querySelector</b></p>

    <p id="demo"></p>
    
    <script>
        var x = document.querySelectorAll("p.intro");
        document.getElementById("demo").innerHTML = "El primer párrafo (index 0) con la clase= intro: es " + x[0].innerHTML;
    </script>
    
</body>
</html>
