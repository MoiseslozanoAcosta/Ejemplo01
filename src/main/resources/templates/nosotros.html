<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nosotros | UTEQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        .seccion-card { border-left: 4px solid #0d6efd; border-radius: 0 8px 8px 0; }
        .seccion-titulo { color: #0d6efd; font-size: 0.8rem; font-weight: 700;
                          text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/fragment :: menu}"></nav>

<div class="container mt-3">
    <div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumb})}"></div>
</div>

<!-- Hero -->
<div class="bg-primary text-white py-5 mb-5">
    <div class="container text-center">
        <h1 class="fw-bold display-6">Conoce la UTEQ</h1>
        <p class="lead mb-0">Universidad Tecnológica de Querétaro</p>
    </div>
</div>

<div class="container">

    <!-- Misión y Visión en columnas -->
    <div class="row g-4 mb-5">

        <div class="col-md-6" th:if="${mision != null}">
            <div class="card h-100 shadow-sm seccion-card p-4">
                <p class="seccion-titulo mb-2">Misión</p>
                <p class="mb-0" th:text="${mision.contenido}"></p>
            </div>
        </div>

        <div class="col-md-6" th:if="${vision != null}">
            <div class="card h-100 shadow-sm seccion-card p-4"
                 style="border-left-color: #198754;">
                <p class="seccion-titulo mb-2" style="color:#198754;">Visión</p>
                <p class="mb-0" th:text="${vision.contenido}"></p>
            </div>
        </div>

    </div>

    <!-- Política de calidad -->
    <div class="row g-4 mb-5" th:if="${politica != null}">
        <div class="col-12">
            <div class="card shadow-sm seccion-card p-4"
                 style="border-left-color: #6f42c1;">
                <p class="seccion-titulo mb-2" style="color:#6f42c1;">Política de Calidad</p>
                <p class="mb-0" th:text="${politica.contenido}"></p>
                <div class="mt-2 text-muted small"
                     th:if="${politica.textoDocumento != null}">
                    Documento: <span th:text="${politica.textoDocumento}"></span>
                    &nbsp;|&nbsp; Rev. <span th:text="${politica.revision}"></span>
                    &nbsp;|&nbsp; <span th:text="${politica.fechaDocumento}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Objetivos SGE y Valores en columnas -->
    <div class="row g-4 mb-5">

        <div class="col-md-6" th:if="${objetivos != null}">
            <div class="card h-100 shadow-sm seccion-card p-4"
                 style="border-left-color: #fd7e14;">
                <p class="seccion-titulo mb-2" style="color:#fd7e14;">Objetivos SGE</p>
                <p class="mb-0" th:text="${objetivos.contenido}"></p>
            </div>
        </div>

        <div class="col-md-6" th:if="${valores != null}">
            <div class="card h-100 shadow-sm seccion-card p-4"
                 style="border-left-color: #20c997;">
                <p class="seccion-titulo mb-2" style="color:#20c997;">Valores</p>
                <p class="mb-0" th:text="${valores.contenido}"></p>
            </div>
        </div>

    </div>

    <!-- Mensaje si no hay contenido -->
    <div th:if="${mision == null and vision == null and politica == null}"
         class="alert alert-info text-center">
        El contenido institucional estará disponible próximamente.
    </div>

    <!-- Directorio -->
    <div th:if="${not #lists.isEmpty(directorio)}" class="mb-5">
        <h2 class="fw-bold mb-4 border-bottom pb-2">Directorio Institucional</h2>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" th:each="c : ${directorio}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="fw-bold mb-1" th:text="${c.nombre}"></h5>
                        <p class="text-primary small mb-1 fw-bold" th:text="${c.puesto}"></p>
                        <p class="text-muted small mb-2" th:text="${c.departamento}"></p>
                        <div th:if="${c.telefono != null and c.telefono != ''}">
                            <small class="text-muted">
                                Ext: <span th:text="${c.telefono}"></span>
                            </small>
                        </div>
                        <div th:if="${c.email != null and c.email != ''}">
                            <small>
                                <a th:href="'mailto:' + ${c.email}"
                                   th:text="${c.email}"
                                   class="text-decoration-none"></a>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
