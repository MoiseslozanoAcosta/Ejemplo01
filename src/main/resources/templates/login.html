<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">
            <h2 class="card-title fw-bold mb-1">Acceso al Sistema</h2>
            <p class="text-muted mb-4">Ingresa tus credenciales para continuar</p>

            <!-- Mensaje de error -->
            <div th:if="${param.error}" class="alert alert-danger py-2">
                Usuario o contraseña incorrectos.
            </div>
            <!-- Mensaje de logout -->
            <div th:if="${param.logout}" class="alert alert-success py-2">
                Sesión cerrada correctamente.
            </div>
            <!-- Agrega esto junto a los otros alerts que ya tienes -->
            <div th:if="${exito}" class="alert alert-success py-2" th:text="${exito}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">Usuario</label>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="Ej. admin" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">Contraseña</label>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
                <div class="text-center mt-3">
                <a th:href="@{/forgot-password}" class="text-muted small">
                ¿Olvidaste tu contraseña?
                </a>
</div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
