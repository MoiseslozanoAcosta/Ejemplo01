<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferta Educativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav th:replace="fragments/fragment :: menu"></nav>

    <div class="container mt-2">
        <div th:replace="fragments/breadcrumb :: breadcrumb(${breadcrumb})"></div>
    </div>

    <div class="container mt-4">
        <h1>Oferta Educativa</h1>
    </div>

    <div class="container mt-4">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="oferta : ${ofertas}">
                <div class="card h-100">
                    <img style="width: 50px; height: 50px;" th:src="@{${oferta.imagen}}" class="card-img-top" alt="Imagen de la oferta">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${oferta.nombreOferta}">Nombre de la Oferta</h5>
                        <p class="card-text" th:text="${oferta.modalidad}">Modalidad</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
