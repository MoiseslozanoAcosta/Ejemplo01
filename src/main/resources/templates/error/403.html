<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm text-center" style="width: 100%; max-width: 500px;">
        <div class="card-body p-5">

            <div class="mb-3">
                <span class="badge bg-danger fs-1 px-4 py-3">403</span>
            </div>

            <h2 class="fw-bold mb-2">Acceso Denegado</h2>
            <p class="text-muted mb-4">
                No tienes permisos para acceder a esta sección.
            </p>

            <!-- Muestra el usuario y rol cuando está autenticado -->
            <div sec:authorize="isAuthenticated()" class="alert alert-warning py-2 mb-4">
                Estás autenticado como
                <strong sec:authentication="name">usuario</strong>
                con el rol
                <strong sec:authentication="principal.authorities">rol</strong>.
            </div>

            <div class="d-flex justify-content-center gap-3">
                <!-- Redirige según si está autenticado o no -->
                <a sec:authorize="isAuthenticated()"
                   th:href="@{/home}"
                   class="btn btn-primary px-4">
                    Ir al inicio
                </a>
                <a sec:authorize="!isAuthenticated()"
                   th:href="@{/login}"
                   class="btn btn-primary px-4">
                    Iniciar sesión
                </a>
                <a th:href="javascript:history.back()"
                   class="btn btn-outline-secondary px-4">
                    Regresar
                </a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
