<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-1">Recuperar contraseña</h2>
            <p class="text-muted mb-4">
                Ingresa tu usuario y te enviaremos instrucciones.
            </p>

            <div th:if="${mensaje}" class="alert alert-info py-2"
                 th:text="${mensaje}"></div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Usuario</label>
                    <input type="text" name="username" class="form-control"
                           placeholder="Ej. admin" required autofocus
                           autocomplete="username">
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Enviar instrucciones
                </button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-muted small">
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
